      <stop stop-color="#2A8BFF"/>
      <stop offset="1" stop-color="#6FC2FF"/>
    </linearGradient>
    <linearGradient id="lineMint" x1="860" y1="392" x2="1097" y2="392" gradientUnits="userSpaceOnUse">
